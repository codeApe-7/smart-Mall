server:
  port: 6050
  servlet:
    context-path: /api
ws:
  port: 6051
spring:
  config:
    activate:
      on-profile: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/smart-mall?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  task:
    scheduling:
      pool:
        size: 5
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  codec:
    default-charset: UTF-8
  #elasticsearch相关
  elasticsearch:
    uris: http://localhost:9200
    #username: elastic  # 如果启用了安全认证
    #password: your_password
  ai:
    chat:
      client:
        enabled: true
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${SMART_MALL_ASSISTANT_MODEL:gpt-4.1-mini}
    mcp:
      client:
        enabled: true
        name: smartMall-web
        version: 1.0.0
        type: SYNC
        request-timeout: 20s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            smartMallMcp:
              url: ${SMART_MALL_MCP_URL:http://127.0.0.1:8084}
              endpoint: /mcp
mybatis:
  configuration:
    map-underscore-to-camel-case: true
#项目目录
project:
  folder: e:/webser/web_app/smartMall/
smart-mall:
  assistant:
    agent:
      enabled: ${SMART_MALL_ASSISTANT_AGENT_ENABLED:false}
  search:
    semantic-enabled: ${SMART_MALL_SEMANTIC_SEARCH_ENABLED:false}
    elasticsearch-uri: ${SMART_MALL_ES_URL:${spring.elasticsearch.uris}}
    product-index-name: ${SMART_MALL_PRODUCT_INDEX:smart_mall_product}
    semantic-candidate-size: ${SMART_MALL_SEMANTIC_CANDIDATE_SIZE:50}
#日志级别
log:
  root:
    level: debug
