server:
  port: 6061
  servlet:
    context-path: /api
spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/smart-mall?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  task:
    scheduling:
      pool:
        size: 5
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  #elasticsearch相关
#  elasticsearch:
#    uris: http://localhost:9200
#    #username: elastic  # 如果启用了安全认证
#    #password: your_password
mybatis:
  configuration:
    map-underscore-to-camel-case: true
#项目目录
project:
  folder: e:/webser/web_app/smartMall/
admin:
  account: admin
  password: admin123
smart-mall:
  assistant:
    agent:
      enabled: ${SMART_MALL_ASSISTANT_AGENT_ENABLED:false}
  search:
    semantic-enabled: ${SMART_MALL_SEMANTIC_SEARCH_ENABLED:false}
    elasticsearch-uri: ${SMART_MALL_ES_URL:http://localhost:9200}
    product-index-name: ${SMART_MALL_PRODUCT_INDEX:smart_mall_product}
    semantic-candidate-size: ${SMART_MALL_SEMANTIC_CANDIDATE_SIZE:50}
  rag:
    product:
      enabled: ${SMART_MALL_RAG_PRODUCT_ENABLED:true}
      default-page-size: ${SMART_MALL_RAG_PRODUCT_PAGE_SIZE:3}
      max-review-snippet-count: ${SMART_MALL_RAG_REVIEW_SNIPPET_COUNT:3}
      max-property-snippet-count: ${SMART_MALL_RAG_PROPERTY_SNIPPET_COUNT:4}
      max-compare-count: ${SMART_MALL_RAG_COMPARE_COUNT:3}
      after-sales-highlights:
        - ${SMART_MALL_AFTER_SALES_1:支持7天无理由退货，商品保持完好可申请售后。}
        - ${SMART_MALL_AFTER_SALES_2:如遇质量问题可联系平台客服协助处理退款或换货。}
        - ${SMART_MALL_AFTER_SALES_3:默认工作时间内提供在线售后咨询与订单跟踪服务。}
  admin:
    ai-monitor:
      recent-days: ${SMART_MALL_ADMIN_AI_MONITOR_RECENT_DAYS:7}
      recent-event-limit: ${SMART_MALL_ADMIN_AI_MONITOR_RECENT_EVENT_LIMIT:10}
      openai-api-key: ${OPENAI_API_KEY:}
      openai-base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      mcp-url: ${SMART_MALL_MCP_URL:http://127.0.0.1:8084}/mcp
    dashboard:
      trend-days: ${SMART_MALL_ADMIN_DASHBOARD_TREND_DAYS:7}
      low-stock-threshold: ${SMART_MALL_ADMIN_LOW_STOCK_THRESHOLD:10}
      low-stock-limit: ${SMART_MALL_ADMIN_LOW_STOCK_LIMIT:10}
      pending-shipment-limit: ${SMART_MALL_ADMIN_PENDING_SHIPMENT_LIMIT:10}
sa-token:
  token-name: adminToken
  timeout: 86400
  active-timeout: 86400
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  is-read-param: true
#日志级别
log:
  root:
    level: debug
