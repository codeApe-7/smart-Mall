server:
  port: 8084
  main:
    web-application-type: reactive
spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/smartMall?allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  task:
    scheduling:
      pool:
        size: 5
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  elasticsearch:
    uris: ${SMART_MALL_ES_URL:http://127.0.0.1:9200}
  ai:
    # MCP 服务
    mcp:
      server:
        protocol: STREAMABLE # STREAMABLE STATELESS
        name: smartMall-mcp  # 服务器名称
        version: 1.0.0
        streamable-http:
          mcp-endpoint: /mcp  #默认是mcp
          keep-alive-interval: 60s
mybatis:
  configuration:
    map-underscore-to-camel-case: true
#项目目录
#项目目录
project:
  folder: e:/webser/web_app/smartMall/
smart-mall:
  search:
    semantic-enabled: ${SMART_MALL_SEMANTIC_SEARCH_ENABLED:false}
    elasticsearch-uri: ${SMART_MALL_ES_URL:${spring.elasticsearch.uris}}
    product-index-name: ${SMART_MALL_PRODUCT_INDEX:smart_mall_product}
    semantic-candidate-size: ${SMART_MALL_SEMANTIC_CANDIDATE_SIZE:50}
